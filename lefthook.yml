pre-commit:
  parallel: true
  skip:
    - merge
    - rebase
  commands:
    Oxfmt:
      glob: '**/*'
      run: pnpm exec oxfmt --no-error-on-unmatched-pattern {staged_files}
      stage_fixed: true
      fail_text: 'Oxfmt 格式化失败，请检查文件格式'
    Oxlint:
      glob: '*.{js,ts,jsx,tsx,cjs,cts,mjs,mts}'
      run: pnpm exec oxlint --fix {staged_files}
      stage_fixed: true
      fail_text: 'Oxlint 检查失败，请修复后重新提交'

post-merge:
  commands:
    install:
      run: pnpm install

commit-msg:
  commands:
    commitlint:
      run: pnpm exec commitlint --edit {1}
      fail_text: 'Commit message 格式不符合规范，请参考 commitlint 规则'
